<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page not found · krzyzak.dev</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; }

    body {
      background: #07080f;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── CRT effects ── */
    .crt-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(74,222,128,0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,222,128,0.055) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridPulse 6s ease-in-out infinite;
    }
    .crt-lines {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 4px);
    }
    .crt-scanlines {
      position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0;
      animation: flicker 8s ease-in-out infinite;
    }
    .crt-scanline-a {
      position: absolute; left: 0; right: 0; height: 180px;
      background: linear-gradient(to bottom, transparent, rgba(74,222,128,0.04), rgba(74,222,128,0.02), transparent);
      animation: scanline 8s linear infinite;
    }
    .crt-scanline-b {
      position: absolute; left: 0; right: 0; height: 80px;
      background: linear-gradient(to bottom, transparent, rgba(74,222,128,0.025), transparent);
      animation: scanline 13s linear infinite;
      animation-delay: -5s;
    }

    @keyframes gridPulse { 0%,100% { opacity:.5; } 50% { opacity:1; } }
    @keyframes flicker { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:.85} 94%{opacity:1} 96%{opacity:.9} 97%{opacity:1} }
    @keyframes scanline { 0%{transform:translateY(-100%)} 100%{transform:translateY(100vh)} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Layout ── */
    nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 72px;
      border-bottom: 1px solid rgba(74,222,128,0.1);
    }
    @media (max-width: 768px) { nav { padding: 16px 20px; } }

    .nav-brand { display: flex; align-items: center; gap: 8px; }
    .nav-brand .name { font-size: 1rem; color: #4ade80; font-weight: 500; }
    .nav-brand .tld  { font-size: 1rem; color: #334155; }
    .nav-brand .cursor { font-size: 1rem; color: #4ade80; }

    main {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      text-align: left;
    }

    .terminal {
      width: 100%;
      max-width: 600px;
    }

    .error-code {
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 700;
      line-height: 1;
      color: #4ade80;
      letter-spacing: -0.04em;
      text-shadow: 0 0 40px rgba(74,222,128,0.25);
      margin-bottom: 8px;
    }

    .error-label {
      font-size: 0.7rem;
      color: #334155;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .prompt-line {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
      font-size: 0.875rem;
    }
    .prompt-line .chevron { color: #4ade80; flex-shrink: 0; margin-top: 1px; }
    .prompt-line .cmd     { color: #94a3b8; }
    .prompt-line .arg     { color: #e2e8f0; }

    .output-line {
      font-size: 0.8rem;
      color: #475569;
      padding-left: 22px;
      margin-bottom: 4px;
      line-height: 1.8;
    }
    .output-line.error { color: #f87171; }
    .output-line.dim   { color: #1e293b; }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin: 28px 0;
    }

    .prompt-line.active .arg::after {
      content: '▮';
      color: #4ade80;
      margin-left: 2px;
      animation: blink 1.1s step-end infinite;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      color: #07080f;
      background: #4ade80;
      padding: 12px 28px;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s;
      margin-top: 8px;
    }
    .home-link:hover {
      background: #86efac;
      box-shadow: 0 0 18px rgba(74,222,128,0.35);
    }

    footer {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 72px;
      border-top: 1px solid rgba(74,222,128,0.07);
      font-size: 0.7rem;
      color: #1e293b;
    }
    @media (max-width: 768px) { footer { padding: 16px 20px; } }
  </style>
</head>
<body>

<div class="crt-grid"></div>
<div class="crt-lines"></div>
<div class="crt-scanlines">
  <div class="crt-scanline-a"></div>
  <div class="crt-scanline-b"></div>
</div>

<nav>
  <div class="nav-brand">
    <span class="name">krzyzak</span>
    <span class="tld">.dev</span>
    <span class="cursor">▮</span>
  </div>
</nav>

<main>
  <div class="terminal">
    <div class="error-code">404</div>
    <div class="error-label">// page not found</div>

    <div class="prompt-line">
      <span class="chevron">❯</span>
      <span class="cmd">find</span>&nbsp;<span class="arg">. -name "page" -type f</span>
    </div>
    <div class="output-line error">find: No such file or directory</div>
    <div class="output-line dim">exit code: 1</div>

    <hr class="divider">

    <div class="prompt-line">
      <span class="chevron">❯</span>
      <span class="cmd">git</span>&nbsp;<span class="arg">log --oneline -- "page"</span>
    </div>
    <div class="output-line">fatal: no commits found matching path</div>

    <hr class="divider">

    <div class="prompt-line active">
      <span class="chevron">❯</span>
      <span class="cmd">cd</span>&nbsp;<span class="arg">~</span>
    </div>

    <a href="/" class="home-link">$ cd ~</a>
  </div>
</main>

<footer>
  <span>krzyzak.dev &mdash; Poland &middot; Remote</span>
</footer>

</body>
</html>
